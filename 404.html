<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kgbird • 404</title>
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="css/style.css?v=5">
  <style>
    .intro { position:fixed; inset:0; z-index:10000; background:#050505; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 1.5s cubic-bezier(0.16,1,0.3,1), visibility 1.5s; overflow:hidden; }
    .intro--done { opacity:0; visibility:hidden; pointer-events:none; }
    .intro__brand { position:relative; z-index:3; text-align:center; opacity:0; animation:introBrand 1.8s cubic-bezier(0.16,1,0.3,1) 0.4s forwards; }
    @keyframes introBrand { 0%{opacity:0;transform:translateY(12px);filter:blur(4px);} 100%{opacity:1;transform:translateY(0);filter:blur(0);} }
    .intro__title { font-family:var(--font-display); font-size:clamp(2.5rem,7vw,5rem); font-weight:100; letter-spacing:0.3em; text-transform:lowercase; color:var(--pure-white); -webkit-text-stroke:0.3px rgba(0,0,0,0.3); margin-right:-0.3em; }
    .intro__line { width:48px; height:0.5px; background:#d4a0b8; margin-top:20px; transform:scaleX(0); opacity:0; z-index:3; position:relative; animation:introLine 1.5s cubic-bezier(0.16,1,0.3,1) 0.8s forwards; }
    @keyframes introLine { 0%{transform:scaleX(0);opacity:0;} 100%{transform:scaleX(1);opacity:0.7;} }
    @keyframes introSub { from{opacity:0;} to{opacity:0.5;} }

    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .error-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .error-page__tiger {
      position: absolute;
      width: clamp(300px, 40vw, 500px);
      opacity: 0.06;
      filter: grayscale(0.5) brightness(0.5);
      pointer-events: none;
    }
    .error-page__code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 14rem);
      font-weight: 200;
      color: var(--pure-white);
      letter-spacing: 0.1em;
      line-height: 0.9;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1.5s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }
    .error-page__text {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: lowercase;
      color: var(--ash);
      margin-top: 20px;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }
    .error-page__link {
      margin-top: 48px;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
    }
    .error-page__link a {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: lowercase;
      color: var(--silver);
      text-decoration: none;
      padding: 14px 36px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .error-page__link a:hover {
      border-color: var(--pink-muted);
      color: var(--white);
      background: var(--pink-ghost);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="intro" id="introScreen">
    <div class="intro__brand">
      <img src="img/kg-pink-t.png" alt="" style="width:clamp(48px,8vw,72px);opacity:0.9;margin-bottom:16px;">
      <h2 class="intro__title">kgbird</h2>
      <p style="font-size:0.55rem;letter-spacing:0.3em;color:var(--ash);margin-top:20px;opacity:0;animation:introSub 1s cubic-bezier(0.16,1,0.3,1) 2.4s forwards;"><span style="font-family:'JetBrains Mono','SF Mono',monospace;font-size:0.65rem;">©</span> <span style="font-family:'JetBrains Mono','SF Mono',monospace;font-size:0.65rem;">℗</span> 2026 kgbird records</p>
    </div>
    <div class="intro__line"></div>
  </div>

  <div class="grain"></div>
  <div class="error-page">
    <img src="img/tiger-hq.jpg" alt="" class="error-page__tiger" aria-hidden="true">
    <div class="error-page__code">404</div>
    <p class="error-page__text">nothing here.</p>
    <div class="error-page__link">
      <a href="index.html">back</a>
    </div>
  </div>

  <footer class="footer container">
    <img src="img/kg-pink-t.png" alt="" class="footer__logo" aria-hidden="true">
    <div class="footer__divider" style="width:32px;height:1px;background:var(--slate);margin:20px auto;"></div>
    <p style="font-size:0.8rem;font-weight:300;letter-spacing:0.25em;text-transform:lowercase;color:var(--muted);margin-bottom:12px;">kgbird records</p>
    <p class="footer__legal">© ℗ 2026 kgbird records — british columbia, canada. all rights reserved.</p>
    <p style="font-size:0.65rem;letter-spacing:0.15em;text-transform:lowercase;color:rgba(255,255,255,0.08);margin-top:6px;line-height:1.8;">
      all tracks written, produced, mixed, and mastered by kgbird.
    </p>
    <div class="footer__links" style="margin-top:28px;">
      <a href="about.html" class="footer__link">about</a>
      <a href="music.html" class="footer__link">catalog</a>
      <a href="merch.html" class="footer__link">merch</a>
      <a href="https://instagram.com/kgbirdaudio" target="_blank" rel="noopener" class="footer__link">instagram</a>
    </div>
    <a href="mailto:support@kgbird.ca" style="display:inline-block;margin-top:20px;font-size:0.7rem;letter-spacing:0.15em;color:var(--ash);text-decoration:none;transition:color 0.3s;">support@kgbird.ca</a>
    <p style="margin-top:8px;font-size:0.6rem;letter-spacing:0.15em;color:var(--slate);">kgbird.ca</p>
  </footer>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('introScreen').classList.add('intro--done');
      }, 3200);
    });
  </script>
</body>
</html>
