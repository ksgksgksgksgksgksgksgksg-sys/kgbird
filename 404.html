<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — kgbird</title>
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .error-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .error-page__tiger {
      position: absolute;
      width: clamp(300px, 40vw, 500px);
      opacity: 0.06;
      filter: grayscale(0.5) brightness(0.5);
      pointer-events: none;
    }
    .error-page__code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 14rem);
      font-weight: 200;
      color: var(--pure-white);
      letter-spacing: 0.1em;
      line-height: 0.9;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1.5s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }
    .error-page__text {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: lowercase;
      color: var(--ash);
      margin-top: 20px;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }
    .error-page__link {
      margin-top: 48px;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
    }
    .error-page__link a {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: lowercase;
      color: var(--silver);
      text-decoration: none;
      padding: 14px 36px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .error-page__link a:hover {
      border-color: var(--pink-muted);
      color: var(--white);
      background: var(--pink-ghost);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="error-page">
    <img src="img/tiger-hq.jpg" alt="" class="error-page__tiger" aria-hidden="true">
    <div class="error-page__code">404</div>
    <p class="error-page__text">nothing here.</p>
    <div class="error-page__link">
      <a href="index.html">back</a>
    </div>
  </div>
</body>
</html>
