<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>releases grid — order reference</title>
<style>
  body { background: #080808; color: #ccc; font-family: 'Urbanist', sans-serif; margin: 40px; }
  h2 { font-weight: 200; letter-spacing: 0.3em; margin: 0 0 20px; color: #d4a0b8; font-size: 0.9rem; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; max-width: 1000px; }
  .cell { position: relative; aspect-ratio: 1; overflow: hidden; }
  .cell.big { grid-column: span 2; grid-row: span 2; }
  .cell img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
  .num { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2rem; font-weight: 700; color: #d4a0b8; z-index: 2; }
  .cell.big .num { font-size: 4rem; }
  .label { position: absolute; bottom: 6px; left: 8px; font-size: 0.5rem; color: #999; letter-spacing: 0.1em; z-index: 2; }
</style>
</head><body>
<h2>current layout — tell me the new order by number</h2>
<div class="grid">
  <div class="cell big"><img src="img/cover-alpha-v2.png"><span class="num">1</span><span class="label">alpha-v2 (2x2)</span></div>
  <div class="cell"><img src="img/cover-tardigrade.png"><span class="num">2</span><span class="label">tardigrade</span></div>
  <div class="cell"><img src="img/cover-silhouette.png"><span class="num">3</span><span class="label">silhouette</span></div>
  <div class="cell"><img src="img/cover-paradigm-real.jpg"><span class="num">4</span><span class="label">paradigm-real</span></div>
  <div class="cell"><img src="img/cover-elite-real.png"><span class="num">5</span><span class="label">elite-real</span></div>
  <div class="cell"><img src="img/cover-halflit-real.png"><span class="num">6</span><span class="label">halflit-real</span></div>
  <div class="cell"><img src="img/cover-receipts.png"><span class="num">7</span><span class="label">receipts</span></div>
  <div class="cell"><img src="img/cover-access-real.png"><span class="num">8</span><span class="label">access-real</span></div>
  <div class="cell"><img src="img/cover-due-real.png"><span class="num">9</span><span class="label">due-real</span></div>
  <div class="cell"><img src="img/cover-leverage-real.jpg"><span class="num">10</span><span class="label">leverage-real</span></div>
  <div class="cell"><img src="img/cover-still-real.png"><span class="num">11</span><span class="label">still-real</span></div>
  <div class="cell"><img src="img/cover-resurrect-real.png"><span class="num">12</span><span class="label">resurrect-real</span></div>
</div>
</body></html>
